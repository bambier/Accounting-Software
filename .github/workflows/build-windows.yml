name: Build Windows Application

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows Application
    runs-on: windows-latest

    env:
      # main.py uses sibling absolute imports (e.g. `from app import
      # Application`), so src/ must be importable at compile time.
      PYTHONPATH: src

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          architecture: "x64"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade -r noversion.requirements.txt

      - name: Build with Nuitka
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          script-name: src/main.py
          mode: standalone
          enable-plugins: pyside6
          include-module: |
            app
            main_window
          include-package: |
            controllers
            data_models
            models
            plugins
            services
            ui
            utils
            widgets
          output-filename: Ganzabara
          output-dir: build_output
          windows-console-mode: disable
          windows-icon-from-ico: src/resources/images/icon.ico
          company-name: Vahrka
          product-name: Ganzabara
          file-version: 1.0.0.0
          product-version: 1.0.0.0
          file-description: "Ganzabara Accounting Software"
          copyright: "Copyright © 2025 Vahrka. All rights reserved."
          lto: yes
          assume-yes-for-downloads: true

      - name: Package standalone folder
        shell: bash
        run: |
          cd build_output
          DIST_DIR=$(find . -maxdepth 1 -type d -name "*.dist" | head -n 1)
          echo "Dist folder: $DIST_DIR"
          7z a -tzip "Ganzabara-windows-x64.zip" "$DIST_DIR/*"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ganzabara-Windows-x64
          path: build_output/Ganzabara-windows-x64.zip
          if-no-files-found: error
